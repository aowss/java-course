name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '**/slides.md'
      - 'slides/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build slide deck
        run: ./slides/build-full-deck.sh

      - name: Prepare site
        run: |
          mkdir -p _site
          cp slides/index.html _site/index.html
          cp slides/reveal-theme.css _site/reveal-theme.css
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
